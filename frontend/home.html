<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopLite</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: white;
        }

        nav {
            background: #111827;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 28px;
            font-weight: bold;
        }

        .cart-btn {
            font-size: 24px;
            cursor: pointer;
            text-decoration: none;
            color: white;
        }

        .hero {
            text-align: center;
            padding: 40px 20px;
        }

        .products {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            padding: 20px 40px 40px;
        }

        .card {
            background: #1e293b;
            border-radius: 12px;
            overflow: hidden;
            padding-bottom: 20px;
        }

        .card img {
            width: 100%;
            height: 220px;
            object-fit: cover;
        }

        .content {
            padding: 20px;
        }

        .price {
            color: #38bdf8;
            font-size: 20px;
            font-weight: bold;
        }

        .quantity {
            color: #94a3b8;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            background: #38bdf8;
            color: black;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 10px;
        }

        button:hover {
            background: #0ea5e9;
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">ShopLite</div>

        <a href="cart.html" class="cart-btn">
            🛒
        </a>
    </nav>

    <section class="hero">
        <h1>Welcome to ShopLite</h1>
        <p>Simple 3-Tier Kubernetes E-Commerce Project</p>
    </section>

    <section class="products" id="products"></section>

    <script>
        async function loadProducts() {
            const response = await fetch("http://localhost:5000/api/products")

            const products = await response.json()

            const productsContainer = document.getElementById("products")

            productsContainer.innerHTML = ""

            products.forEach(product => {
                const card = document.createElement("div")

                card.className = "card"

                card.innerHTML = `
                    <img src="${product.image}" />

                    <div class="content">
                        <h2>${product.name}</h2>

                        <p class="price">₹${product.price}</p>

                        <p class="quantity">
                            Available: ${product.quantity}
                        </p>

                        <button onclick='addToCart(${JSON.stringify(product)})'>
                            Add To Cart
                        </button>
                    </div>
                `

                productsContainer.appendChild(card)
            })
        }

        async function addToCart(product) {
            await fetch("http://localhost:5000/api/cart", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(product)
            })

            alert("Added to cart")
        }

        loadProducts()
    </script>

</body>
</html>
