<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f5f1ed 0%, #eef5f0 100%);
            color: #2d3436;
            min-height: 100vh;
        }

        /* Navigation */
        nav {
            background: rgba(255, 255, 255, 0.95);
            padding: 20px 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(200, 180, 170, 0.2);
        }

        nav h1 {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #8b9d83 0%, #b08968 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        nav a {
            color: #8b9d83;
            text-decoration: none;
            font-weight: 600;
            font-size: 15px;
            letter-spacing: 0.3px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        nav a:hover {
            color: #b08968;
            transform: translateX(-4px);
        }

        /* Container */
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 60px 40px;
        }

        .cart-header {
            margin-bottom: 40px;
        }

        .cart-header h2 {
            font-size: 32px;
            color: #2d3436;
            margin-bottom: 8px;
        }

        .cart-header p {
            color: #6b7280;
            font-size: 14px;
            font-weight: 500;
        }

        /* Cart Items Container */
        .cart-items-wrapper {
            margin-bottom: 40px;
        }

        .cart-item {
            display: flex;
            gap: 24px;
            background: white;
            margin-bottom: 16px;
            padding: 24px;
            border-radius: 16px;
            align-items: center;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
            transition: all 0.3s ease;
        }

        .cart-item:hover {
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
            transform: translateY(-2px);
        }

        .cart-item img {
            width: 140px;
            height: 140px;
            object-fit: cover;
            border-radius: 12px;
            background: linear-gradient(135deg, #f0ebe6 0%, #e8f0ed 100%);
            flex-shrink: 0;
        }

        .details {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .details h2 {
            font-size: 18px;
            font-weight: 600;
            color: #2d3436;
            margin-bottom: 8px;
        }

        .details p {
            font-size: 20px;
            font-weight: 700;
            color: #b08968;
        }

        .remove-btn {
            border: none;
            padding: 12px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            letter-spacing: 0.3px;
            background: #f5e6e0;
            color: #d97706;
            transition: all 0.3s ease;
            text-transform: uppercase;
            flex-shrink: 0;
        }

        .remove-btn:hover {
            background: #e8d4cc;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(217, 119, 6, 0.2);
        }

        .remove-btn:active {
            transform: translateY(0);
        }

        /* Empty Cart Message */
        .empty-cart {
            text-align: center;
            padding: 60px 20px;
            color: #9ca3af;
        }

        .empty-cart p {
            font-size: 18px;
            margin-bottom: 24px;
        }

        /* Cart Summary */
        .cart-summary {
            background: white;
            padding: 32px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            margin-bottom: 24px;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding-bottom: 16px;
            border-bottom: 1px solid #e5e7eb;
        }

        .summary-row:last-child {
            margin-bottom: 0;
            padding-bottom: 0;
            border-bottom: none;
        }

        .summary-label {
            color: #6b7280;
            font-weight: 500;
            font-size: 15px;
        }

        .summary-value {
            color: #2d3436;
            font-weight: 600;
            font-size: 16px;
        }

        .total {
            font-size: 28px;
            font-weight: 700;
            color: #b08968;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 16px;
            border-top: 2px solid #f0ebe6;
            margin-top: 16px;
        }

        .total span {
            font-size: 32px;
        }

        /* Checkout Button */
        .checkout-btn {
            background: linear-gradient(135deg, #8b9d83 0%, #a8b59e 100%);
            color: white;
            width: 100%;
            padding: 18px;
            font-size: 16px;
            font-weight: 700;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            transition: all 0.3s ease;
            box-shadow: 0 4px 16px rgba(139, 157, 131, 0.2);
        }

        .checkout-btn:hover {
            background: linear-gradient(135deg, #7a8c72 0%, #97a48d 100%);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(139, 157, 131, 0.35);
        }

        .checkout-btn:active {
            transform: translateY(0);
        }

        .checkout-btn:disabled {
            background: #d1d5db;
            cursor: not-allowed;
            transform: none;
        }

        /* Responsive */
        @media (max-width: 768px) {
            nav {
                padding: 16px 20px;
                flex-direction: column;
                gap: 12px;
            }

            nav h1 {
                font-size: 24px;
            }

            nav a {
                font-size: 14px;
            }

            .container {
                padding: 40px 20px;
            }

            .cart-header h2 {
                font-size: 24px;
            }

            .cart-item {
                flex-direction: column;
                text-align: center;
                gap: 16px;
            }

            .cart-item img {
                width: 100%;
                height: 200px;
            }

            .remove-btn {
                width: 100%;
            }

            .details {
                width: 100%;
            }

            .total {
                flex-direction: column;
                gap: 8px;
            }

            .cart-summary {
                padding: 24px;
            }

            .checkout-btn {
                padding: 16px;
                font-size: 15px;
            }
        }
    </style>
</head>
<body>

    <nav>
        <h1>Your Cart</h1>
        <a href="/home.html">
            ← Back To Shopping
        </a>
    </nav>

    <div class="container">

        <div class="cart-header">
            <h2>Shopping Cart</h2>
            <p>Review your items before checkout</p>
        </div>

        <div class="cart-items-wrapper" id="cart-items-wrapper"></div>

        <div class="cart-summary">
            <div id="cart-items"></div>
            <div class="total" id="total"></div>
        </div>

        <button class="checkout-btn" onclick="checkout()">
            Proceed to Payment
        </button>

    </div>

    <script>
        async function loadCart() {
            const response = await fetch("/api/cart")

            const cart = await response.json()

            const cartItemsWrapper = document.getElementById("cart-items-wrapper")
            const cartItems = document.getElementById("cart-items")
            const total = document.getElementById("total")

            cartItemsWrapper.innerHTML = ""
            cartItems.innerHTML = ""

            if (cart.length === 0) {
                cartItemsWrapper.innerHTML = `
                    <div class="empty-cart">
                        <p>🛒 Your cart is empty</p>
                        <a href="/home.html" style="color: #8b9d83; font-weight: 600;">Continue Shopping</a>
                    </div>
                `
                total.innerHTML = ""
                return
            }

            let totalPrice = 0

            cart.forEach((item, index) => {
                totalPrice += item.price

                const div = document.createElement("div")
                div.className = "cart-item"

                div.innerHTML = `
                    <img src="${item.image}" alt="${item.name}" />

                    <div class="details">
                        <h2>${item.name}</h2>
                        <p>₹${item.price}</p>
                    </div>

                    <button
                        class="remove-btn"
                        onclick="removeItem(${index})"
                    >
                        Remove
                    </button>
                `

                cartItemsWrapper.appendChild(div)
            })

            cartItems.innerHTML = `
                <div class="summary-row">
                    <span class="summary-label">Subtotal</span>
                    <span class="summary-value">₹${totalPrice}</span>
                </div>
                <div class="summary-row">
                    <span class="summary-label">Shipping</span>
                    <span class="summary-value">Free</span>
                </div>
                <div class="summary-row">
                    <span class="summary-label">Tax</span>
                    <span class="summary-value">₹0</span>
                </div>
            `

            total.innerHTML = `
                <span>Total:</span>
                <span>₹${totalPrice}</span>
            `
        }

        async function removeItem(index) {
            await fetch(`/api/cart/${index}`, {
                method: "DELETE"
            })

            loadCart()
        }

        async function checkout() {
            await fetch("/api/checkout", {
                method: "POST"
            })

            alert("Payment Successful")

            loadCart()
        }

        loadCart()
    </script>

</body>
</html>
